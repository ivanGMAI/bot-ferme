apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-ferme-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bot-ferme-db
  template:
    metadata:
      labels:
        app: bot-ferme-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          args:
            - "-c"
            - "listen_addresses=*"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "bot_ferme"
            - name: POSTGRES_USER
              value: "user"
            - name: POSTGRES_PASSWORD
              value: "pass"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user"]
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: bot-ferme-db
spec:
  selector:
    app: bot-ferme-db
  ports:
    - port: 5432
      targetPort: 5432